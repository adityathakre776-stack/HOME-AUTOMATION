# IoT Home Automation — Mosquitto Configuration
# Place this file at: C:\Program Files\mosquitto\mosquitto.conf
# or   /etc/mosquitto/mosquitto.conf  (Linux)
# Then restart: net start mosquitto  /  sudo systemctl restart mosquitto

# ── Listener: Standard MQTT (for ESP32) ─────────────────
listener 1883
protocol mqtt

# ── Listener: WebSocket (for browser dashboard) ──────────
listener 9001
protocol websockets

# ── Allow anonymous for local dev (disable in production) ─
allow_anonymous true

# ── Persistence ───────────────────────────────────────────
persistence true
persistence_location C:/Program Files/mosquitto/data/
# persistence_location /var/lib/mosquitto/  # Linux

# ── Logging ───────────────────────────────────────────────
log_dest file C:/Program Files/mosquitto/log/mosquitto.log
# log_dest file /var/log/mosquitto/mosquitto.log  # Linux
log_type all

# ── Retained messages ─────────────────────────────────────
# Retained messages ensure status is always available
# on reconnect. All topics use retain=true already.

# ── Auth (uncomment and configure for production) ─────────
# password_file C:/Program Files/mosquitto/passwd
# allow_anonymous false

# To create password file:
#   mosquitto_passwd -c C:\...\passwd mqtt_user
