<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Home · Login</title>
  <meta name="description" content="IoT Smart Home Automation — Secure Login" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #060b18;
      --bg-card:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
      --accent:     #4f8ef7;
      --accent2:    #7c5cfc;
      --text:       #e8eaf6;
      --text-dim:   rgba(232,234,246,0.55);
      --success:    #22c55e;
      --error:      #ef4444;
      --radius:     16px;
      --input-bg:   rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.25;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: #4f8ef7; top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: #7c5cfc; bottom: -100px; right: -100px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: #22c55e; bottom: 30%; left: 40%; opacity: 0.12; animation-delay: 5s; }
    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none; z-index: 0;
    }

    .login-container {
      position: relative; z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      padding: 48px 40px;
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(79,142,247,0.4);
    }
    .logo-text h1 { font-size: 20px; font-weight: 700; }
    .logo-text p  { font-size: 12px; color: var(--text-dim); }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px; font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    .form-group input::placeholder { color: rgba(232,234,246,0.3); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }
    .btn-login:hover   { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login.loading { pointer-events: none; opacity: 0.7; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.15);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }
    .alert.show { display: block; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    .hint {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .hint code {
      background: rgba(79,142,247,0.15);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">
          <h1>Smart Home</h1>
          <p>IoT Automation System</p>
        </div>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
      </form>

      <div class="hint">
        Default: <code>admin</code> / <code>admin123</code>
      </div>
    </div>
  </div>

  <script>
    // Auto-redirect if already logged in
    fetch('backend_php/api/auth.php?action=check')
      .then(r => r.json())
      .then(data => {
        if (data.loggedIn) window.location.href = 'frontend/dashboard.html';
      }).catch(() => {});

    const form    = document.getElementById('loginForm');
    const btn     = document.getElementById('loginBtn');
    const alertEl = document.getElementById('alertBox');

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert alert-${type} show`;
      alertEl.textContent = msg;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.classList.add('loading');
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch('backend_php/api/auth.php?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          showAlert('Login successful! Redirecting…', 'success');
          setTimeout(() => window.location.href = 'frontend/dashboard.html', 800);
        } else {
          showAlert(data.error || 'Login failed');
          btn.classList.remove('loading');
          btn.innerHTML = 'Sign In';
        }
      } catch (err) {
        showAlert('Connection error. Is XAMPP running?');
        btn.classList.remove('loading');
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
