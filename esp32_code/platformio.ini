; PlatformIO Project Configuration
; IoT Home Automation - ESP32

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200

; Libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
