<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>3D Smart Room – Night</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020408
        }

        canvas {
            display: block
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 50;
            pointer-events: none;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 98vw
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(3, 6, 18, .88);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 24px;
            padding: 6px 14px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 11.5px;
            font-weight: 500;
            color: rgba(180, 195, 240, .65);
            pointer-events: auto;
            cursor: pointer;
            transition: all .22s;
            user-select: none;
            white-space: nowrap
        }

        .pill:hover {
            border-color: rgba(255, 255, 255, .18);
            color: #cdd8ff
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            transition: all .3s;
            flex-shrink: 0
        }

        .pill.on-light {
            background: rgba(255, 210, 50, .08);
            border-color: rgba(255, 210, 50, .4);
            color: #ffd832
        }

        .pill.on-light .dot {
            background: #ffd832;
            box-shadow: 0 0 8px #ffd832
        }

        .pill.on-fan {
            background: rgba(80, 140, 255, .08);
            border-color: rgba(80, 140, 255, .4);
            color: #6aabff
        }

        .pill.on-fan .dot {
            background: #6aabff;
            box-shadow: 0 0 8px #6aabff
        }

        .pill.on-tv {
            background: rgba(220, 8, 18, .08);
            border-color: rgba(220, 8, 18, .4);
            color: #ff5050
        }

        .pill.on-tv .dot {
            background: #ff5050;
            box-shadow: 0 0 8px #ff5050
        }

        .pill.on-ac {
            background: rgba(0, 210, 255, .08);
            border-color: rgba(0, 210, 255, .4);
            color: #00d4ff
        }

        .pill.on-ac .dot {
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff
        }

        /* AC temp controls */
        .act {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 7px;
            padding-left: 7px;
            border-left: 1px solid rgba(255, 255, 255, .1)
        }

        .atb {
            background: rgba(0, 200, 255, .1);
            border: 1px solid rgba(0, 200, 255, .28);
            border-radius: 4px;
            color: #00d4ff;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .14s;
            font-family: 'Segoe UI', sans-serif;
            flex-shrink: 0
        }

        .atb:hover {
            background: rgba(0, 200, 255, .25);
            color: #fff;
            transform: scale(1.12)
        }

        #ac-tv {
            font-size: 11px;
            font-weight: 700;
            color: #00d4ff;
            min-width: 30px;
            text-align: center
        }

        /* Tooltip */
        #tip {
            position: fixed;
            background: rgba(2, 5, 16, .92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(60, 120, 255, .3);
            border-radius: 8px;
            padding: 5px 12px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            color: #b0c4ff;
            pointer-events: none;
            display: none;
            z-index: 99
        }

        /* Bottom hints */
        #hints {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
            z-index: 50;
            pointer-events: none
        }

        .hc {
            background: rgba(2, 5, 16, .7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 8px;
            padding: 4px 12px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 10.5px;
            color: rgba(160, 175, 220, .5)
        }

        .hc b {
            color: rgba(200, 215, 255, .7)
        }

        /* Night mode tag */
        #nightTag {
            position: fixed;
            top: 10px;
            right: 12px;
            background: rgba(2, 5, 16, .8);
            border: 1px solid rgba(80, 100, 180, .25);
            border-radius: 8px;
            padding: 4px 10px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            color: rgba(140, 160, 220, .6);
            z-index: 50;
            pointer-events: none
        }
    </style>
</head>

<body>
    <div id="hud">
        <div class="pill" id="p-light1" onclick="toggleDev('light1')"><span class="dot"></span>💡 Light 1: <b>OFF</b>
        </div>
        <div class="pill" id="p-light2" onclick="toggleDev('light2')"><span class="dot"></span>💡 Light 2: <b>OFF</b>
        </div>
        <div class="pill" id="p-fan" onclick="toggleDev('fan')"><span class="dot"></span>🌀 Fan: <b>OFF</b></div>
        <div class="pill" id="p-tv" onclick="toggleDev('tv')"><span class="dot"></span>📺 TV: <b>OFF</b></div>
        <div class="pill" id="p-ac" onclick="toggleDev('ac')" style="gap:5px">
            <span class="dot"></span>❄️ AC: <b id="ac-ps">OFF</b>
            <div class="act">
                <button class="atb" onclick="event.stopPropagation();acT(-1)">▼</button>
                <span id="ac-tv">24°C</span>
                <button class="atb" onclick="event.stopPropagation();acT(1)">▲</button>
            </div>
        </div>
    </div>
    <div id="tip"></div>
    <div id="nightTag">🌙 Night Mode</div>
    <div id="hints">
        <div class="hc">Scroll to <b>zoom</b></div>
        <div class="hc">Drag to <b>orbit</b></div>
        <div class="hc">Click to <b>toggle</b></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        /* ── RENDERER ── */
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020408);
        scene.fog = new THREE.Fog(0x020408, 16, 30);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 80);
        camera.position.set(0, 3.4, 9.5);

        let controls = null;
        try {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.5, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.055;
            controls.screenSpacePanning = true;    // right-drag pans parallel to screen
            controls.enablePan = true;             // middle/right mouse panning
            controls.panSpeed = 1.0;
            controls.zoomSpeed = 1.4;              // faster scroll zoom
            controls.rotateSpeed = 0.75;
            controls.minPolarAngle = 0;            // can look straight up
            controls.maxPolarAngle = Math.PI * 0.9; // can look straight down
            controls.minDistance = 0.4;            // zoom all the way into AC/TV
            controls.maxDistance = 20;             // zoom far out to see whole room
            controls.keys = { LEFT: 37, UP: 38, RIGHT: 39, BOTTOM: 40 };
            controls.listenToKeyEvents(window);    // arrow keys to orbit
            controls.update();
        } catch (e) { console.warn('OrbitControls:', e); }

        /* ── CONSTANTS ── */
        const PI = Math.PI;
        const RW = 13, RH = 4.2, RD = 11;

        /* ── STATE ── */
        const DS = { light1: false, light2: false, fan: false, tv: false, ac: false };
        let acSetTemp = 24, acRoomT = 28.5;
        let fanVel = 0, fanTarget = 0, fanAngle = 0;

        /* ── HELPERS ── */
        function mk(geo, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0, rz = 0, sh = true) {
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, y, z); m.rotation.set(rx, ry, rz);
            if (sh) { m.castShadow = true; m.receiveShadow = true; }
            scene.add(m); return m;
        }
        const B = (w, h, d, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0, rz = 0) => mk(new THREE.BoxGeometry(w, h, d), mat, x, y, z, rx, ry, rz);
        const C = (rt, rb, h, s, mat, x = 0, y = 0, z = 0, rx = 0, ry = 0, rz = 0) => mk(new THREE.CylinderGeometry(rt, rb, h, s), mat, x, y, z, rx, ry, rz);
        const S = (r, s, mat, x = 0, y = 0, z = 0) => mk(new THREE.SphereGeometry(r, s, s), mat, x, y, z);
        const std = (c, r = .9, m = 0, ex = {}) => new THREE.MeshStandardMaterial({ color: c, roughness: r, metalness: m, ...ex });

        /* ── MATERIALS – night palette ── */
        const M = {
            // Room – deep dark night tones
            floor: std(0x100e0b, .92, .02),
            rug: std(0x1a2235, 1),
            wall: std(0x0d1020, .96),
            wallB: std(0x0a0d1a, .97),
            ceil: std(0x080b14, .98),
            trim: std(0x141828, .65, .15),
            // Furniture
            sofa: std(0x121c2e, .94), sofaL: std(0x182540, .9),
            wood: std(0x2a1c0a, .85), woodL: std(0x3d2810, .8),
            metal: std(0x6a6a7a, .28, .92), metalD: std(0x1a1a28, .42, .88),
            tvFr: std(0x080810, .18, .82), cushion: std(0x1c2e4a, .95), tableT: std(0xa07840, .38, .1),
            book1: std(0x5a0e0e), book2: std(0x0f2e6a), book3: std(0x1a5220), book4: std(0x5a420a),
            leaf: std(0x124428, .92), pot: std(0x301c0a, .9), cord: std(0x0e0e0e, .95),
            shade: std(0x141825, .52, .42, { side: THREE.DoubleSide }),
            fanHub: std(0x888898, .3, .9), fanBl: std(0x5c4018, .75),
            glass: std(0x1e3050, .05, .42, { transparent: true, opacity: .48 }),
            art1: std(0x060d1e, .95, 0, { emissive: new THREE.Color(.02, .04, .1), emissiveIntensity: 1 }),
            art2: std(0x180808, .95, 0, { emissive: new THREE.Color(.08, .02, .02), emissiveIntensity: 1 }),
            artFr: std(0x241812, .5, .28),
            // Night window – deep moonlit blue
            winFr: std(0x7a6030, .52, .22),
            winGl: std(0x060e28, 0, 0, { emissive: new THREE.Color(.04, .06, .22), emissiveIntensity: 1, transparent: true, opacity: .55, side: THREE.DoubleSide }),
            // AC
            acBody: std(0xccd8e0, .52, .1),
            acFront: std(0xe0eaf0, .42, .08),
            acGrille: std(0xb8c8d4, .72, .05),
            acSlat: std(0xd4e0ea, .38, .08, { side: THREE.DoubleSide }),
        };

        /* ════════════════════════════════════════
           CANVAS TEXTURES
        ════════════════════════════════════════ */

        /* ── NETFLIX 4K (3840×2160, all coords ×3) ── */
        function makeNetflix() {
            const W = 3840, H = 2160, cv = document.createElement('canvas'); cv.width = W; cv.height = H;
            const c = cv.getContext('2d');

            // Background
            c.fillStyle = '#141414'; c.fillRect(0, 0, W, H);

            // Hero background gradient (left side blue-dark)
            const hg = c.createLinearGradient(0, 0, W * .6, H * .75);
            hg.addColorStop(0, '#1a2150'); hg.addColorStop(.5, '#0d1535'); hg.addColorStop(1, '#141414');
            c.fillStyle = hg; c.fillRect(0, 0, W, H * .74);

            // Right fade to black
            const rf = c.createLinearGradient(W * .5, 0, W, 0);
            rf.addColorStop(0, 'transparent'); rf.addColorStop(1, 'rgba(20,20,20,.96)');
            c.fillStyle = rf; c.fillRect(0, 0, W, H * .74);

            // Bottom fade to black
            const bf = c.createLinearGradient(0, H * .52, 0, H * .75);
            bf.addColorStop(0, 'transparent'); bf.addColorStop(1, '#141414');
            c.fillStyle = bf; c.fillRect(0, H * .52, W, H * .24);

            // Top nav gradient
            const tg = c.createLinearGradient(0, 0, 0, 264);
            tg.addColorStop(0, 'rgba(0,0,0,.88)'); tg.addColorStop(1, 'transparent');
            c.fillStyle = tg; c.fillRect(0, 0, W, 264);

            // ── Netflix N logo (×3 scale)
            c.save(); c.fillStyle = '#E50914';
            c.fillRect(132, 36, 30, 216);      // left bar
            c.fillRect(258, 36, 30, 216);      // right bar
            c.beginPath(); c.moveTo(162, 36); c.lineTo(258, 252); c.lineTo(258, 210); c.lineTo(162, 78); c.closePath(); c.fill();
            c.restore();

            // NETFLIX wordmark
            c.font = 'bold 138px Arial'; c.fillStyle = '#E50914'; c.textAlign = 'left';
            c.fillText('NETFLIX', 312, 219);

            // Nav bar
            const navItems = ['Home', 'TV Shows', 'Movies', 'New & Popular', 'My List'];
            navItems.forEach((n, i) => {
                c.font = '51px Arial';
                c.fillStyle = i === 0 ? '#fff' : 'rgba(255,255,255,.75)';
                c.fillText(n, 690 + i * 570, 180);
            });

            // ── STRANGER THINGS hero
            c.save();
            c.shadowColor = 'rgba(0,0,0,.95)'; c.shadowBlur = 72;
            c.font = 'bold 234px Arial'; c.fillStyle = '#fff'; c.textAlign = 'left';
            c.fillText('STRANGER', 186, 705);
            c.font = 'bold 270px Arial'; c.fillStyle = '#ff2222';
            c.fillText('THINGS', 186, 1014);
            c.restore();

            // N badge (Netflix branded show)
            c.fillStyle = '#E50914'; c.fillRect(186, 1062, 8, 42);
            c.font = 'bold 46px Arial'; c.fillStyle = 'rgba(255,255,255,.9)'; c.fillText(' N  Series', 186, 1104);

            // Match + year
            c.fillStyle = '#46d369'; c.font = 'bold 51px Arial';
            c.fillText('★★★★☆  97% Match', 186, 1176);

            // Genre / year
            c.fillStyle = 'rgba(255,255,255,.55)'; c.font = '45px Arial';
            c.fillText('2022  ·  4 Seasons  ·  TV-14  ·  Sci-Fi / Horror', 186, 1251);

            // Description
            c.fillStyle = 'rgba(255,255,255,.78)'; c.font = '42px Arial';
            c.fillText('When a young boy vanishes, a small town uncovers a mystery', 186, 1320);
            c.fillText('involving secret experiments and terrifying supernatural forces.', 186, 1374);

            // Buttons
            function rr(x, y, w, h, r) {
                c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
                c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
                c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
                c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r);
                c.arcTo(x, y, x + r, y, r); c.closePath();
            }
            // Play button
            c.fillStyle = '#fff'; rr(186, 1422, 450, 144, 18); c.fill();
            c.fillStyle = '#000'; c.font = 'bold 54px Arial'; c.textAlign = 'center';
            c.fillText('▶  Play', 186 + 225, 1422 + 90);
            // More Info button
            c.fillStyle = 'rgba(109,109,110,.7)'; rr(654, 1422, 534, 144, 18); c.fill();
            c.fillStyle = '#fff'; c.font = 'bold 48px Arial';
            c.fillText('ⓘ  More Info', 654 + 267, 1422 + 90);

            // ── TRENDING NOW row
            c.text = 'left'; c.textAlign = 'left';
            c.fillStyle = 'rgba(255,255,255,.92)'; c.font = 'bold 63px Arial';
            c.fillText('Trending Now', 162, 1638);

            const shows = [
                { t: 'Ozark', a: '#1a237e', b: '#3949ab' },
                { t: 'Squid Game', a: '#7b0a2c', b: '#c13359' },
                { t: 'The Witcher', a: '#163318', b: '#2e6b35' },
                { t: 'Bridgerton', a: '#3e1060', b: '#7c40aa' },
                { t: 'Money Heist', a: '#8f2900', b: '#c94a1a' },
                { t: 'Dark', a: '#0a3040', b: '#1a6080' },
                { t: 'Wednesday', a: '#111', b: '#333' }
            ];
            shows.forEach((s, i) => {
                const sx = 162 + i * 516, sy = 1710, sw = 474, sh = 276;
                if (sx + sw > W - 30) return;
                const g = c.createLinearGradient(sx, sy, sx + sw, sy + sh);
                g.addColorStop(0, s.a); g.addColorStop(1, s.b);
                c.fillStyle = g; rr(sx, sy, sw, sh, 15); c.fill();
                const dg = c.createLinearGradient(sx, sy, sx, sy + sh);
                dg.addColorStop(0, 'transparent'); dg.addColorStop(1, 'rgba(0,0,0,.6)');
                c.fillStyle = dg; rr(sx, sy, sw, sh, 15); c.fill();
                c.fillStyle = 'rgba(255,255,255,.95)'; c.font = 'bold 39px Arial'; c.textAlign = 'left';
                c.fillText(s.t, sx + 24, sy + sh - 30);
                c.fillStyle = 'rgba(0,0,0,.55)'; c.font = 'bold 66px Arial';
                c.fillText(String(i + 1), sx + 21, sy + 72);
            });

            // Progress bar (currently watching indicator)
            c.fillStyle = 'rgba(255,255,255,.18)'; c.fillRect(162, 1998, 474, 9);
            c.fillStyle = '#E50914'; c.fillRect(162, 1998, 300, 9);

            const t = new THREE.CanvasTexture(cv); t.needsUpdate = true; return t;
        }


        /* ── TV OFF ── */
        function makeTvOff() {
            const cv = document.createElement('canvas'); cv.width = 4096; cv.height = 2304;
            const c = cv.getContext('2d'), W = 4096, H = 2304;
            c.fillStyle = '#000'; c.fillRect(0, 0, W, H);
            const L = c.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 64);
            L.addColorStop(0, 'rgba(255,30,30,.88)'); L.addColorStop(1, 'transparent');
            c.fillStyle = L; c.beginPath(); c.arc(W / 2, H / 2, 64, 0, PI * 2); c.fill();
            c.fillStyle = 'rgba(255,60,40,.95)'; c.beginPath(); c.arc(W / 2, H / 2, 20, 0, PI * 2); c.fill();
            c.fillStyle = 'rgba(255,255,255,.06)'; c.font = 'bold 140px Arial'; c.textAlign = 'center'; c.fillText('SAMSUNG', W / 2, H / 2 + 200);
            c.font = '80px Arial'; c.fillStyle = 'rgba(255,255,255,.04)'; c.fillText('Smart TV  ·  Standby', W / 2, H / 2 + 310);
            const t = new THREE.CanvasTexture(cv); t.needsUpdate = true; return t;
        }

        /* 4K AC LCD — 2560×800, all values ×4 */
        function makeAcLCD(on, setT, roomT) {
            const W = 2560, H = 800, cv = document.createElement('canvas'); cv.width = W; cv.height = H;
            const c = cv.getContext('2d');
            // Panel background
            const bg = c.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#1a1e24'); bg.addColorStop(1, '#0e1118');
            c.fillStyle = bg; c.fillRect(0, 0, W, H);
            c.strokeStyle = 'rgba(0,210,255,.18)'; c.lineWidth = 6; c.strokeRect(3, 3, W - 6, H - 6);
            if (on) {
                // Operation LED top-right
                const led = c.createRadialGradient(W - 112, 112, 0, W - 112, 112, 56);
                led.addColorStop(0, 'rgba(0,255,100,1)'); led.addColorStop(.4, 'rgba(0,220,80,.8)'); led.addColorStop(1, 'rgba(0,200,60,0)');
                c.fillStyle = led; c.beginPath(); c.arc(W - 112, 112, 56, 0, PI * 2); c.fill();
                c.fillStyle = '#00ff64'; c.beginPath(); c.arc(W - 112, 112, 18, 0, PI * 2); c.fill();
                c.fillStyle = 'rgba(0,255,100,.55)'; c.font = '36px "Courier New"'; c.textAlign = 'right'; c.fillText('OPERATION', W - 180, 128);
                // SET TEMP — huge 7-segment digits
                c.shadowColor = '#00ffff'; c.shadowBlur = 140; c.fillStyle = '#00ffff';
                c.font = 'bold 440px "Courier New",monospace'; c.textAlign = 'center';
                c.fillText(String(setT).padStart(2, '0'), W / 2 - 160, 540); c.shadowBlur = 0;
                // °C
                c.font = 'bold 160px "Courier New"'; c.fillStyle = '#44eeff';
                c.shadowColor = '#44eeff'; c.shadowBlur = 48; c.fillText('°C', W / 2 + 320, 376); c.shadowBlur = 0;
                // SET TEMP label
                c.fillStyle = 'rgba(0,200,220,.65)'; c.font = '40px "Courier New"'; c.textAlign = 'center'; c.fillText('SET TEMP', W / 2 - 160, 608);
                // Mode icons left column
                [{ icon: '❄', label: 'COOL', active: true }, { icon: '🔥', label: 'HEAT' }, { icon: '💨', label: 'FAN' }, { icon: '💧', label: 'DRY' }, { icon: '🔄', label: 'AUTO' }]
                    .forEach((mode, i) => {
                        const mx = 128, my = 120 + i * 128;
                        if (mode.active) {
                            c.fillStyle = 'rgba(0,200,255,.18)'; c.beginPath();
                            c.roundRect ? c.roundRect(mx - 24, my - 64, 248, 104, 16) : c.rect(mx - 24, my - 64, 248, 104); c.fill();
                            c.strokeStyle = 'rgba(0,200,255,.4)'; c.lineWidth = 3; c.stroke(); c.fillStyle = '#00d4ff';
                        } else { c.fillStyle = 'rgba(255,255,255,.22)'; }
                        c.font = '44px "Courier New"'; c.textAlign = 'left'; c.fillText(mode.label, mx + 88, my + 16);

                MAT_acLCD.emissive = new THREE.Color(.1, .35, .42); MAT_acLCD.emissiveIntensity = 2.8;
            } else {
                MAT_acLCD.emissiveMap = null; MAT_acLCD.emissive = new THREE.Color(0, 0, 0); MAT_acLCD.emissiveIntensity = 0;
            }
            MAT_acLCD.needsUpdate = true; ptAC.intensity = on ? 1.2 : 0; acGlowMat.opacity = on ? .4 : 0;
        }

        /* ════════════════════════════════════════
           STATE MANAGEMENT + HUD
        ════════════════════════════════════════ */
        const LOCK = {}, LOCK_MS = 4000;
        function applyState(key, on) {
            DS[key] = on;
            if (key === 'light1' || key === 'light2') applyLight(key, on);
            if (key === 'fan') applyFan(on); if (key === 'tv') applyTV(on); if (key === 'ac') applyAC(on);
            updatePill(key, on);
        }
        function updatePill(key, on) {
            const pill = document.getElementById('p-' + key); if (!pill) return;
            const ic = { light1: '💡', light2: '💡', fan: '🌀', tv: '📺', ac: '❄️' };
            const na = { light1: 'Light 1', light2: 'Light 2', fan: 'Fan', tv: 'TV', ac: 'AC' };
            const cl = { light1: 'on-light', light2: 'on-light', fan: 'on-fan', tv: 'on-tv', ac: 'on-ac' };
            if (key === 'ac') {
                const st = document.getElementById('ac-ps'), dot = pill.querySelector('.dot');
                if (st) st.textContent = on ? 'ON' : 'OFF';
                if (dot) { dot.style.background = on ? '#00d4ff' : ''; dot.style.boxShadow = on ? '0 0 10px #00d4ff' : ''; }
                pill.classList.toggle('on-ac', on);
            } else {
                pill.innerHTML = '<span class="dot"></span>' + ic[key] + ' ' + na[key] + ': <b>' + (on ? 'ON' : 'OFF') + '</b>';
                pill.className = 'pill' + (on ? ' ' + cl[key] : '');
            }
        }
        function toggleDev(key) {
            const on = !DS[key]; LOCK[key] = Date.now(); applyState(key, on);
            try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'deviceToggle', device: key, state: on ? 'ON' : 'OFF' }, '*'); } catch (e) { }
        }
        function acT(delta) {
            acSetTemp = Math.max(16, Math.min(30, acSetTemp + delta));
            const el = document.getElementById('ac-tv'); if (el) el.textContent = acSetTemp + '°C';
            if (DS.ac) applyAC(true);
            try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'acTempSync', temp: acSetTemp }, '*'); } catch (e) { }
        }
        window.addEventListener('message', ev => {
            try {
                const d = ev.data; if (!d) return;
                if (d.type === 'deviceState' && d.device) {
                    if (LOCK[d.device] && Date.now() - LOCK[d.device] < LOCK_MS) return;
                    applyState(d.device, d.state === 'ON');
                }
                if (d.type === 'acTempSync' && d.temp) {
                    acSetTemp = d.temp; const el = document.getElementById('ac-tv'); if (el) el.textContent = acSetTemp + '°C'; if (DS.ac) applyAC(true);
                }
            } catch (e) { }
        });

        /* ════════════════════════════════════════
           ANIMATION LOOP
        ════════════════════════════════════════ */
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), .05);
            const et = clock.elapsedTime;
            // Fan spin
            fanVel += (fanTarget - fanVel) * dt * 4.2; fanAngle += fanVel * dt; bladeGrp.rotation.y = fanAngle;
            // Light flicker (candle-like at night)
            if (DS.light1) ptL1.intensity = 4.5 + Math.sin(et * 1.3) * .22 + Math.sin(et * 3.7) * .08;
            if (DS.light2) ptL2.intensity = 4.5 + Math.sin(et * 1.8) * .22 + Math.sin(et * 2.9) * .08;
            // Moon flicker (very subtle)
            ptMoon.intensity = .45 + Math.sin(et * .4) * .04;
            // AC louvers smooth tilt
            const lTgt = DS.ac ? -32 * PI / 180 : 0;
            louvers.forEach(sl => { sl.rotation.z += (lTgt - sl.rotation.z) * dt * 5; });
            if (controls) controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
